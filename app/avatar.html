<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Avatar Viewer - PhysiqAI</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="animations.css">
    <link rel="stylesheet" href="mobile.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body class="page-avatar">
    <!-- Navigation -->
    <nav class="navbar navbar-transparent">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-icon">◆</span>
                <span class="logo-text">PhysiqAI</span>
            </a>
            <button class="nav-toggle" id="navToggle">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html">Home</a></li>
                <li><a href="upload.html">Create Avatar</a></li>
                <li><a href="avatar.html" class="active">3D Viewer</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
            </ul>
        </div>
    </nav>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading 3D Avatar...</div>
        <div class="loading-bar">
            <div class="loading-progress" id="loading-progress" style="width: 0%"></div>
        </div>
    </div>

    <!-- 3D Viewer Container -->
    <div class="viewer-container">
        <div id="three-canvas"></div>
        
        <!-- Touch Hint (mobile only) -->
        <div class="touch-hint mobile-only">
            👆 Drag to rotate • Pinch to zoom • Double-tap to reset
        </div>
        
        <!-- Viewer Controls -->
        <div class="viewer-controls">
            <div class="control-group">
                <button class="control-btn" id="resetView" title="Reset View">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                        <path d="M3 3v5h5"/>
                    </svg>
                </button>
                <button class="control-btn" id="toggleRotation" title="Auto Rotate">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.3"/>
                    </svg>
                </button>
                <button class="control-btn" id="toggleWireframe" title="Wireframe">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 3l9 4.5V15L12 21 3 15V7.5L12 3z"/>
                        <path d="M12 12l9-4.5M12 12V3M12 12L3 7.5"/>
                    </svg>
                </button>
            </div>
            <div class="control-group">
                <button class="control-btn" id="zoomIn" title="Zoom In">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        <line x1="11" y1="8" x2="11" y2="14"/>
                        <line x1="8" y1="11" x2="14" y2="11"/>
                    </svg>
                </button>
                <button class="control-btn" id="zoomOut" title="Zoom Out">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        <line x1="8" y1="11" x2="14" y2="11"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Viewer Info Panel -->
        <div class="viewer-info">
            <div class="info-header">
                <h3>Body Metrics</h3>
                <span class="info-date">Feb 23, 2025</span>
            </div>
            <div class="metrics-grid">
                <div class="metric">
                    <span class="metric-label">Height</span>
                    <span class="metric-value">5'10"</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Weight</span>
                    <span class="metric-value">175 lbs</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Body Fat</span>
                    <span class="metric-value">14%</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Muscle Mass</span>
                    <span class="metric-value">42%</span>
                </div>
            </div>
            <div class="info-actions">
                <button class="btn btn-primary btn-sm">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    Download Model
                </button>
                <button class="btn btn-secondary btn-sm" onclick="window.location.href='dashboard.html'">
                    View Timeline
                </button>
            </div>
        </div>

        <!-- Comparison Toggle -->
        <div class="comparison-toggle">
            <label class="toggle-label">
                <input type="checkbox" id="compareMode">
                <span class="toggle-slider"></span>
                <span class="toggle-text">Compare with Previous</span>
            </label>
        </div>
    </div>

    <script src="error-handler.js"></script>
    <script src="toast-system.js"></script>
    <script src="demo-loader.js"></script>
    <script src="qa-tests.js"></script>
    <script src="avatar.js"></script>
    <script src="app.js"></script>
    <script>
        // Performance monitoring
        let frameCount = 0;
        let lastTime = performance.now();
        
        function checkFPS() {
            const currentTime = performance.now();
            frameCount++;
            
            if (currentTime - lastTime >= 1000) {
                const fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
                
                if (fps < 30) {
                    console.warn('[Performance] Low FPS detected:', fps);
                    ToastSystem.warning('Performance mode activated for smoother experience');
                }
            }
            
            requestAnimationFrame(checkFPS);
        }
        
        // Start FPS monitoring after 3 seconds
        setTimeout(checkFPS, 3000);
    </script>
</body>
</html>
