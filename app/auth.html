<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PhysiqAI</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            padding: 20px;
        }
        .auth-container {
            width: 100%;
            max-width: 400px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .auth-logo {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 16px;
        }
        .auth-logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-title {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .auth-subtitle {
            color: #94a3b8;
            font-size: 0.95rem;
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .form-group label {
            font-size: 0.875rem;
            font-weight: 500;
            color: #e2e8f0;
        }
        .form-group input {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 14px 16px;
            font-size: 1rem;
            color: #fff;
            transition: all 0.2s;
            outline: none;
        }
        .form-group input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        .btn-auth {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            color: #fff;
            padding: 14px 24px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }
        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.3);
        }
        .btn-auth:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid rgba(255,255,255,0.1);
            color: #94a3b8;
            font-size: 0.9rem;
        }
        .auth-footer a {
            color: #6366f1;
            text-decoration: none;
            font-weight: 500;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
        .validation-error {
            color: #ef4444 !important;
            font-size: 0.8rem !important;
            margin-top: 4px !important;
            font-weight: 500 !important;
        }
        .form-group input[aria-invalid="true"] {
            border-color: #ef4444 !important;
        }
        .form-group input[aria-invalid="true"]:focus {
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1) !important;
        }
        .demo-info {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 24px;
            font-size: 0.85rem;
            color: #94a3b8;
        }
        .demo-info strong {
            color: #e2e8f0;
        }
    </style>
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-header">
            <div class="auth-logo">
                <span class="auth-logo-icon">◆</span>
                <span>PhysiqAI</span>
            </div>
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Sign in to continue your fitness journey</p>
        </div>

        <div class="demo-info">
            <strong>📋 Validation Demo</strong><br>
            Try entering invalid data to see inline validation in action.<br>
            Email: any valid format | Password: any value (demo)
        </div>

        <form class="auth-form" id="authForm" data-validate-form>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="you@example.com"
                    data-validate="email"
                    autocomplete="email"
                    required
                >
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Enter your password"
                    minlength="6"
                    autocomplete="current-password"
                    required
                >
            </div>
            <button type="submit" class="btn-auth">Sign In</button>
        </form>

        <div class="auth-footer">
            <p>Don't have an account? <a href="#">Sign up</a></p>
            <p style="margin-top: 8px;"><a href="index.html">← Back to Home</a></p>
        </div>
    </div>

    <script src="validation.js"></script>
    <script>
        // Initialize form validation with custom handlers
        document.addEventListener('DOMContentLoaded', () => {
            const authForm = document.getElementById('authForm');
            
            Validation.initFormValidation(authForm, {
                onSuccess: (data) => {
                    // Sanitize all inputs
                    const sanitizedData = {
                        email: Validation.sanitizeHTML(data.email),
                        password: data.password // Password is handled securely by browser
                    };
                    
                    console.log('Login attempt with sanitized data:', { email: sanitizedData.email });
                    alert('✅ Validation passed! In production, this would submit to your auth API.\n\nSanitized Email: ' + sanitizedData.email);
                },
                onError: (errors) => {
                    console.error('Validation errors:', errors);
                }
            });
        });
    </script>
</body>
</html>
