<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PhysiqAI</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            padding: 20px;
        }
        .auth-container {
            width: 100%;
            max-width: 420px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .auth-logo {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 16px;
        }
        .auth-logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-title {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .auth-subtitle {
            color: #94a3b8;
            font-size: 0.95rem;
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .form-group label {
            font-size: 0.875rem;
            font-weight: 500;
            color: #e2e8f0;
        }
        .form-group input {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 14px 16px;
            font-size: 1rem;
            color: #fff;
            transition: all 0.2s;
            outline: none;
        }
        .form-group input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        .btn-auth {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            color: #fff;
            padding: 14px 24px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.3);
        }
        .btn-auth:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .btn-auth.loading {
            pointer-events: none;
        }
        .btn-google {
            background: #fff;
            color: #1f2937;
            border: none;
            padding: 14px 24px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-google:hover {
            background: #f3f4f6;
            transform: translateY(-1px);
        }
        .google-icon {
            width: 20px;
            height: 20px;
        }
        .auth-divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 16px 0;
            color: #94a3b8;
            font-size: 0.875rem;
        }
        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid rgba(255,255,255,0.1);
            color: #94a3b8;
            font-size: 0.9rem;
        }
        .auth-footer a {
            color: #6366f1;
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
        .validation-error {
            color: #ef4444 !important;
            font-size: 0.8rem !important;
            margin-top: 4px !important;
            font-weight: 500 !important;
        }
        .form-group input[aria-invalid="true"] {
            border-color: #ef4444 !important;
        }
        .form-group input[aria-invalid="true"]:focus {
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1) !important;
        }
        .auth-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            padding: 12px 16px;
            color: #fca5a5;
            font-size: 0.875rem;
            display: none;
        }
        .auth-error.show {
            display: block;
        }
        .auth-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 8px;
            padding: 12px 16px;
            color: #6ee7b7;
            font-size: 0.875rem;
            display: none;
        }
        .auth-success.show {
            display: block;
        }
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .hidden {
            display: none !important;
        }
        .name-fields {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        .password-input-wrapper {
            position: relative;
        }
        
        .password-input-wrapper input {
            padding-right: 45px;
        }
        
        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }
        
        .password-toggle:hover {
            color: #6366f1;
        }
        
        .password-toggle svg {
            width: 18px;
            height: 18px;
        }
        
        .password-strength {
            margin-top: 8px;
        }
        
        .strength-bar {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .strength-fill {
            height: 100%;
            width: 0;
            transition: all 0.3s ease;
            border-radius: 2px;
        }
        
        .strength-fill.weak { width: 33%; background: #ef4444; }
        .strength-fill.medium { width: 66%; background: #fbbf24; }
        .strength-fill.strong { width: 100%; background: #10b981; }
        
        .password-requirements {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 8px;
        }
        
        .password-requirements ul {
            list-style: none;
            padding: 0;
            margin: 4px 0 0 0;
        }
        
        .password-requirements li {
            padding: 2px 0;
            padding-left: 16px;
            position: relative;
        }
        
        .password-requirements li::before {
            content: '○';
            position: absolute;
            left: 0;
            color: #64748b;
        }
        
        .password-requirements li.met::before {
            content: '✓';
            color: #10b981;
        }
    </style>
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-header">
            <div class="auth-logo">
                <span class="auth-logo-icon">◆</span>
                <span>PhysiqAI</span>
            </div>
            <h1 class="auth-title" id="authTitle">Welcome Back</h1>
            <p class="auth-subtitle" id="authSubtitle">Sign in to continue your fitness journey</p>
        </div>

        <div class="auth-error" id="authError"></div>
        <div class="auth-success" id="authSuccess"></div>

        <!-- Sign In Form -->
        <form class="auth-form" id="signInForm">
            <div class="form-group">
                <label for="signinEmail">Email Address</label>
                <input 
                    type="email" 
                    id="signinEmail" 
                    name="email" 
                    placeholder="you@example.com"
                    required
                    autocomplete="email"
                >
            </div>
            <div class="form-group">
                <label for="signinPassword">Password</label>
                <div class="password-input-wrapper">
                    <input 
                        type="password" 
                        id="signinPassword" 
                        name="password" 
                        placeholder="Enter your password"
                        minlength="6"
                        required
                        autocomplete="current-password"
                    >
                    <button type="button" class="password-toggle" onclick="togglePasswordVisibility('signinPassword', this)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn-auth" id="signInBtn">
                <span>Sign In</span>
            </button>
        </form>

        <!-- Sign Up Form (hidden by default) -->
        <form class="auth-form hidden" id="signUpForm">
            <div class="name-fields">
                <div class="form-group">
                    <label for="firstName">First Name</label>
                    <input 
                        type="text" 
                        id="firstName" 
                        name="firstName" 
                        placeholder="John"
                        required
                    >
                </div>
                <div class="form-group">
                    <label for="lastName">Last Name</label>
                    <input 
                        type="text" 
                        id="lastName" 
                        name="lastName" 
                        placeholder="Doe"
                        required
                    >
                </div>
            </div>
            <div class="form-group">
                <label for="signupEmail">Email Address</label>
                <input 
                    type="email" 
                    id="signupEmail" 
                    name="email" 
                    placeholder="you@example.com"
                    required
                    autocomplete="email"
                >
            </div>
            <div class="form-group">
                <label for="signupPassword">Password</label>
                <div class="password-input-wrapper">
                    <input 
                        type="password" 
                        id="signupPassword" 
                        name="password" 
                        placeholder="Create a password (8+ characters)"
                        minlength="8"
                        required
                        autocomplete="new-password"
                    >
                    <button type="button" class="password-toggle" onclick="togglePasswordVisibility('signupPassword', this)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
                <div class="password-strength">
                    <div class="strength-bar">
                        <div class="strength-fill" id="strengthFill"></div>
                    </div>
                </div>
                <div class="password-requirements" id="passwordRequirements">
                    <ul>
                        <li id="req-length">At least 8 characters</li>
                        <li id="req-number">At least 1 number</li>
                        <li id="req-symbol">At least 1 special character</li>
                    </ul>
                </div>
            </div>
            <button type="submit" class="btn-auth" id="signUpBtn">
                <span>Create Account</span>
            </button>
        </form>

        <div class="auth-divider">or</div>

        <button class="btn-google" id="googleSignInBtn">
            <svg class="google-icon" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Continue with Google
        </button>

        <div class="auth-footer">
            <p id="signInLink">Don't have an account? <a onclick="showSignUp()">Sign up</a></p>
            <p id="signUpLink" class="hidden">Already have an account? <a onclick="showSignIn()">Sign in</a></p>
            <p style="margin-top: 12px;"><a href="index.html">← Back to Home</a></p>
        </div>
    </div>

    <!-- Firebase Configuration -->
    <script>
        window.firebaseConfig = {
            apiKey: "AIzaSyDQnKtxk_uCiW7owBCSf6ABKE2b5QKdqiU",
            authDomain: "physique-ai-217b0.firebaseapp.com",
            projectId: "physique-ai-217b0",
            storageBucket: "physique-ai-217b0.appspot.com",
            messagingSenderId: "217012345678",
            appId: "1:217012345678:web:abc123def456"
        };
    </script>

    <!-- Firebase API Module -->
    <script type="module">
        import {
            signUpWithEmail,
            signInWithEmail,
            signInWithGoogle,
            onAuthChange,
            signOutUser
        } from './firebase-api.js';

        // DOM Elements
        const signInForm = document.getElementById('signInForm');
        const signUpForm = document.getElementById('signUpForm');
        const signInBtn = document.getElementById('signInBtn');
        const signUpBtn = document.getElementById('signUpBtn');
        const googleBtn = document.getElementById('googleSignInBtn');
        const authError = document.getElementById('authError');
        const authSuccess = document.getElementById('authSuccess');
        const authTitle = document.getElementById('authTitle');
        const authSubtitle = document.getElementById('authSubtitle');

        // Check auth state on load
        onAuthChange((user) => {
            if (user) {
                // User is signed in, redirect to dashboard
                window.location.href = 'dashboard.html';
            }
        });

        // Show error message
        function showError(message) {
            authError.textContent = message;
            authError.classList.add('show');
            authSuccess.classList.remove('show');
        }

        // Show success message
        function showSuccess(message) {
            authSuccess.textContent = message;
            authSuccess.classList.add('show');
            authError.classList.remove('show');
        }

        // Set loading state
        function setLoading(btn, loading) {
            if (loading) {
                btn.classList.add('loading');
                btn.disabled = true;
                btn.innerHTML = '<div class="spinner"></div>';
            } else {
                btn.classList.remove('loading');
                btn.disabled = false;
                btn.innerHTML = `<span>${btn.id === 'signInBtn' ? 'Sign In' : 'Create Account'}</span>`;
            }
        }

        // Sign In handler
        signInForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('signinEmail').value.trim();
            const password = document.getElementById('signinPassword').value;
            
            setLoading(signInBtn, true);
            
            const result = await signInWithEmail(email, password);
            
            if (result.error) {
                showError(result.error.message);
                setLoading(signInBtn, false);
            } else {
                showSuccess('Sign in successful! Redirecting...');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
            }
        });

        // Sign Up handler
        signUpForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            
            setLoading(signUpBtn, true);
            
            const result = await signUpWithEmail(email, password, {
                displayName: `${firstName} ${lastName}`
            });
            
            if (result.error) {
                showError(result.error.message);
                setLoading(signUpBtn, false);
            } else {
                showSuccess('Account created successfully! Redirecting...');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
            }
        });

        // Google Sign In handler
        googleBtn.addEventListener('click', async () => {
            googleBtn.disabled = true;
            googleBtn.innerHTML = '<div class="spinner" style="border-color: rgba(0,0,0,0.2); border-top-color: #333;"></div> Connecting...';
            
            const result = await signInWithGoogle();
            
            if (result.error) {
                showError(result.error.message);
                googleBtn.disabled = false;
                googleBtn.innerHTML = `
                    <svg class="google-icon" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Continue with Google
                `;
            } else {
                showSuccess('Sign in successful! Redirecting...');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
            }
        });

        // Password visibility toggle
        window.togglePasswordVisibility = (inputId, btn) => {
            const input = document.getElementById(inputId);
            const isPassword = input.type === 'password';
            
            input.type = isPassword ? 'text' : 'password';
            
            // Update icon
            btn.innerHTML = isPassword ? 
                `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                </svg>` :
                `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>`;
        };

        // Password strength checker
        function checkPasswordRequirements(password) {
            return {
                hasLength: password.length >= 8,
                hasNumber: /\d/.test(password),
                hasSymbol: /[^a-zA-Z0-9]/.test(password)
            };
        }

        function updatePasswordStrength(password) {
            const requirements = checkPasswordRequirements(password);
            const fill = document.getElementById('strengthFill');
            const signUpBtn = document.getElementById('signUpBtn');
            
            // Update requirement indicators
            document.getElementById('req-length').classList.toggle('met', requirements.hasLength);
            document.getElementById('req-number').classList.toggle('met', requirements.hasNumber);
            document.getElementById('req-symbol').classList.toggle('met', requirements.hasSymbol);
            
            fill.className = 'strength-fill';
            
            // Calculate strength score (0-3)
            let strength = 0;
            if (requirements.hasLength) strength++;
            if (requirements.hasNumber) strength++;
            if (requirements.hasSymbol) strength++;
            
            // Enable button only if medium+ (at least 2 requirements met)
            const isMediumPlus = strength >= 2;
            signUpBtn.disabled = !isMediumPlus;
            signUpBtn.style.opacity = isMediumPlus ? '1' : '0.6';
            
            if (strength === 0 || strength === 1) {
                fill.classList.add('weak');
            } else if (strength === 2) {
                fill.classList.add('medium');
            } else {
                fill.classList.add('strong');
            }
        }

        // Add password strength listener
        document.getElementById('signupPassword').addEventListener('input', (e) => {
            updatePasswordStrength(e.target.value);
        });

        // Initialize signup button as disabled
        document.getElementById('signUpBtn').disabled = true;

        // Expose toggle functions globally
        window.showSignUp = () => {
            signInForm.classList.add('hidden');
            signUpForm.classList.remove('hidden');
            document.getElementById('signInLink').classList.add('hidden');
            document.getElementById('signUpLink').classList.remove('hidden');
            authTitle.textContent = 'Create Account';
            authSubtitle.textContent = 'Start your fitness journey today';
            authError.classList.remove('show');
        };

        window.showSignIn = () => {
            signUpForm.classList.add('hidden');
            signInForm.classList.remove('hidden');
            document.getElementById('signUpLink').classList.add('hidden');
            document.getElementById('signInLink').classList.remove('hidden');
            authTitle.textContent = 'Welcome Back';
            authSubtitle.textContent = 'Sign in to continue your fitness journey';
            authError.classList.remove('show');
        };
    </script>
</body>
</html>
