<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Access - PhysiqAI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .admin-container {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .admin-logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: #888;
            margin-bottom: 30px;
        }
        .btn-admin {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
            transition: transform 0.2s;
        }
        .btn-admin:hover {
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        .status.show {
            display: block;
        }
        .status.success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #22c55e;
        }
        .hint {
            margin-top: 20px;
            font-size: 12px;
            color: #666;
        }
        code {
            background: rgba(255,255,255,0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-logo">⚡</div>
        <h1>Admin Access</h1>
        <p>Quick login for testing PhysiqAI features</p>
        
        <button class="btn-admin" id="adminLogin">Enter as Admin (BZ)</button>
        <button class="btn-admin btn-secondary" id="demoUser">Enter as Demo User</button>
        <button class="btn-admin btn-secondary" id="clearSession">Clear Session</button>
        
        <div class="status" id="status"></div>
        
        <div class="hint">
            Bookmark this page for quick access.<br>
            Admin ID: <code>admin_bz_001</code>
        </div>
    </div>

    <script>
        const status = document.getElementById('status');
        
        function showStatus(message, type = 'success') {
            status.textContent = message;
            status.className = `status ${type} show`;
        }
        
        function setAdminSession() {
            // Clear any existing session
            localStorage.clear();
            
            // Set admin session
            localStorage.setItem('rememberMe', 'true');
            localStorage.setItem('userId', 'admin_bz_001');
            localStorage.setItem('userEmail', 'admin@physiqai.com');
            localStorage.setItem('userName', 'BZ Admin');
            localStorage.setItem('isAdmin', 'true');
            localStorage.setItem('emailVerified', 'true');
            
            // Set some demo data
            localStorage.setItem('physiq_weight_data', JSON.stringify([
                { date: '2026-01-27', weight: 195, notes: 'Starting weight' },
                { date: '2026-02-01', weight: 193, notes: 'First week' },
                { date: '2026-02-08', weight: 192, notes: 'Steady progress' },
                { date: '2026-02-15', weight: 191, notes: 'Good week' },
                { date: '2026-02-26', weight: 190, notes: 'Current' }
            ]));
            
            showStatus('Admin session created! Redirecting...');
            
            setTimeout(() => {
                window.location.href = 'home.html';
            }, 1000);
        }
        
        function setDemoSession() {
            localStorage.clear();
            
            localStorage.setItem('rememberMe', 'true');
            localStorage.setItem('userId', 'demo_user_001');
            localStorage.setItem('userEmail', 'demo@physiqai.com');
            localStorage.setItem('userName', 'Demo User');
            localStorage.setItem('isDemo', 'true');
            localStorage.setItem('emailVerified', 'true');
            
            showStatus('Demo session created! Redirecting...');
            
            setTimeout(() => {
                window.location.href = 'home.html';
            }, 1000);
        }
        
        function clearSession() {
            localStorage.clear();
            showStatus('Session cleared!', 'success');
        }
        
        document.getElementById('adminLogin').addEventListener('click', setAdminSession);
        document.getElementById('demoUser').addEventListener('click', setDemoSession);
        document.getElementById('clearSession').addEventListener('click', clearSession);
        
        // Auto-redirect if already logged in
        const userId = localStorage.getItem('userId');
        if (userId) {
            showStatus('Already logged in as: ' + localStorage.getItem('userName'));
            setTimeout(() => {
                window.location.href = 'home.html';
            }, 1500);
        }
    </script>
</body>
</html>
